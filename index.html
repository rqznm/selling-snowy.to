<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>snowy.to — For Sale</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #050100;
      font-family: 'DM Sans', sans-serif;
    }

    a {
      all: unset;
    }

    canvas#bg {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    .center-halo {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 700px; height: 700px;
      background: radial-gradient(ellipse at center,
        rgba(255,255,255,0.13) 0%,
        rgba(255,230,190,0.06) 28%,
        transparent 68%
      );
      z-index: 1;
      pointer-events: none;
      animation: halo-pulse 6s ease-in-out infinite alternate;
    }

    @keyframes halo-pulse {
      from { opacity: 0.7; transform: translate(-50%, -50%) scale(0.96); }
      to   { opacity: 1;   transform: translate(-50%, -50%) scale(1.04); }
    }

    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    .pill {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      padding: 52px 60px 48px;
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 9999px;
      backdrop-filter: blur(28px) saturate(1.5);
      -webkit-backdrop-filter: blur(28px) saturate(1.5);
      text-align: center;
      max-width: 420px;
      position: relative;
      box-shadow:
        0 0 0 1px rgba(255,130,40,0.08) inset,
        0 40px 80px rgba(0,0,0,0.55);
      animation: card-in 1.2s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes card-in {
      from { opacity: 0; transform: translateY(24px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .tag {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: rgba(255, 175, 75, 0.85);
      background: rgba(255,110,10,0.10);
      border: 1px solid rgba(255,130,30,0.22);
      padding: 5px 18px;
      border-radius: 9999px;
      animation: fade-up 1.4s 0.15s cubic-bezier(0.16,1,0.3,1) both;
    }

    .domain-name {
      font-family: 'Syne', sans-serif;
      font-size: 54px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -0.025em;
      line-height: 1;
      text-shadow:
        0 0 30px rgba(255,255,255,0.25),
        0 0 70px rgba(255,210,120,0.12);
      animation: fade-up 1.4s 0.25s cubic-bezier(0.16,1,0.3,1) both;
    }

    .sub {
      font-size: 13.5px;
      font-weight: 300;
      color: rgba(255,255,255,0.46);
      letter-spacing: 0.03em;
      line-height: 1.65;
      max-width: 270px;
      animation: fade-up 1.4s 0.35s cubic-bezier(0.16,1,0.3,1) both;
    }

    .rule {
      width: 32px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,140,50,0.45), transparent);
      animation: fade-up 1.4s 0.4s cubic-bezier(0.16,1,0.3,1) both;
    }

    .cta-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      animation: fade-up 1.4s 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }

    .btn-offer {
      display: inline-block;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.07em;
      color: rgba(255,255,255,0.92);
      background: rgba(220,80,10,0.22);
      border: 1px solid rgba(255,120,40,0.38);
      padding: 12px 36px;
      border-radius: 9999px;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.3s, border-color 0.3s, transform 0.2s, box-shadow 0.3s;
    }

    .btn-offer:hover {
      background: rgba(220,80,10,0.38);
      border-color: rgba(255,160,80,0.55);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(200,60,0,0.3);
    }

    .note {
      font-size: 11px;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.20);
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<canvas id="bg"></canvas>
<div class="center-halo"></div>

<div class="stage">
  <div class="pill">
    <div class="tag">Premium Domain</div>
    <div class="domain-name">snowy.to</div>
    <div class="sub">A rare, clean 5 letter domain. Versatile, memorable, and yours to shape.</div>
    <div class="rule"></div>
    <div class="cta-row">
      <a class="btn-offer" target="_blank" href="https://www.namecheap.com/domains/registration/results?domain=snowy.to">
        Buy Domain
      </a>
      <span class="note">Check current price on <a href="https://www.namecheap.com/domains/registration/results?domain=snowy.to" style="">Namecheap</a></span>
    </div>
  </div>
</div>

<script>
(function () {
  const canvas = document.getElementById('bg');
  const ctx    = canvas.getContext('2d');

  let W = 0, H = 0;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  /* ─── orbs ─────────────────────────────────────────────────── */
  const orbs = [
    { hue: 14,  sat: 100, bri: 52, alpha: 0.52, radius: 0.54, px: 0.20, py: 0.25, freqX: 1.27, freqY: 0.93, phase: 0.00 },
    { hue: 32,  sat:  98, bri: 50, alpha: 0.44, radius: 0.47, px: 0.78, py: 0.70, freqX: 0.83, freqY: 1.41, phase: 1.90 },
    { hue:  6,  sat: 100, bri: 45, alpha: 0.40, radius: 0.42, px: 0.55, py: 0.85, freqX: 1.10, freqY: 0.71, phase: 4.20 },
    { hue: 44,  sat:  95, bri: 55, alpha: 0.38, radius: 0.40, px: 0.30, py: 0.65, freqX: 0.70, freqY: 1.30, phase: 1.05 },
    { hue: 22,  sat: 100, bri: 48, alpha: 0.36, radius: 0.44, px: 0.72, py: 0.18, freqX: 1.50, freqY: 0.60, phase: 3.40 },
    { hue:  2,  sat:  96, bri: 38, alpha: 0.30, radius: 0.36, px: 0.10, py: 0.75, freqX: 0.95, freqY: 1.15, phase: 5.80 },
  ];

  /* ─── streaks ───────────────────────────────────────────────── */
  const STREAK_COUNT = 12;

  /* ─── draw loop ─────────────────────────────────────────────── */
  function draw(ts) {
    const t  = ts * 0.001;
    const cx = W * 0.5;
    const cy = H * 0.5;
    const R  = Math.min(W, H);

    /* base */
    ctx.fillStyle = '#060100';
    ctx.fillRect(0, 0, W, H);

    /* orbs */
    ctx.globalCompositeOperation = 'screen';

    orbs.forEach(o => {
      const tx = t * (0.09 + o.phase * 0.012);
      const ty = t * (0.07 + o.phase * 0.009);
      const bx = (0.5 + 0.48 * Math.sin(tx * o.freqX + o.phase)) * W;
      const by = (0.5 + 0.48 * Math.cos(ty * o.freqY + o.phase * 0.8)) * H;
      const rad = o.radius * R;

      /* slowly drift hue */
      const h = o.hue + 18 * Math.sin(t * 0.12 + o.phase);

      const g = ctx.createRadialGradient(bx, by, 0, bx, by, rad);
      g.addColorStop(0,   `hsla(${h},${o.sat}%,${o.bri}%,${o.alpha})`);
      g.addColorStop(0.35,`hsla(${h+8},${o.sat}%,${Math.max(o.bri - 12,20)}%,${o.alpha * 0.6})`);
      g.addColorStop(0.65,`hsla(${h+4},85%,${Math.max(o.bri - 22,12)}%,${o.alpha * 0.25})`);
      g.addColorStop(1,   `hsla(${h},75%,8%,0)`);

      ctx.beginPath();
      ctx.arc(bx, by, rad, 0, Math.PI * 2);
      ctx.fillStyle = g;
      ctx.fill();
    });

    /* central white light pool */
    const haloR = R * 0.30;
    const halo  = ctx.createRadialGradient(cx, cy, 0, cx, cy, haloR);
    halo.addColorStop(0,   'rgba(255,248,235,0.10)');
    halo.addColorStop(0.45,'rgba(255,230,200,0.04)');
    halo.addColorStop(1,   'rgba(255,200,150,0)');
    ctx.beginPath();
    ctx.arc(cx, cy, haloR, 0, Math.PI * 2);
    ctx.fillStyle = halo;
    ctx.fill();

    /* light streaks radiating from centre */
    for (let s = 0; s < STREAK_COUNT; s++) {
      const angle  = (s / STREAK_COUNT) * Math.PI * 2 + t * 0.018;
      const flicker = 0.5 + 0.5 * Math.sin(t * 1.1 + s * 2.3);
      const len    = R * (0.18 + 0.09 * Math.sin(t * 0.4 + s * 1.7));
      const x1 = cx + Math.cos(angle) * R * 0.04;
      const y1 = cy + Math.sin(angle) * R * 0.04;
      const x2 = cx + Math.cos(angle) * len;
      const y2 = cy + Math.sin(angle) * len;

      const sg  = ctx.createLinearGradient(x1, y1, x2, y2);
      const a   = (0.055 + 0.035 * flicker);
      sg.addColorStop(0, `rgba(255,255,255,${a})`);
      sg.addColorStop(1, 'rgba(255,255,255,0)');

      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.strokeStyle = sg;
      ctx.lineWidth   = 1.2 + 1.2 * Math.sin(t * 0.5 + s * 0.9);
      ctx.stroke();
    }

    ctx.globalCompositeOperation = 'source-over';

    requestAnimationFrame(draw);
  }

  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
